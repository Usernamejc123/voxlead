<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Voxlead — Operator Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

<!-- Header -->
<div class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold text-sm">V</div>
    <span class="font-semibold text-lg tracking-tight">Voxlead</span>
    <span class="text-gray-500 text-sm">/ Operator</span>
  </div>
  <button onclick="openNewCampaign()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition">+ New Campaign</button>
</div>

<div class="max-w-6xl mx-auto px-6 py-8 space-y-8">

  <!-- Upload Leads Panel -->
  <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
    <h2 class="text-base font-semibold mb-4">Upload Leads to Campaign</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="md:col-span-1">
        <label class="block text-xs text-gray-400 mb-1">Select Campaign</label>
        <select id="uploadCampaignId" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
          <option value="">Loading campaigns…</option>
        </select>
      </div>
      <div class="md:col-span-2">
        <label class="block text-xs text-gray-400 mb-1">CSV File <span class="text-gray-600">(columns: email, first_name, last_name, company, title, industry)</span></label>
        <input type="file" id="csvFile" accept=".csv" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 file:mr-3 file:bg-indigo-600 file:border-0 file:text-white file:text-xs file:px-3 file:py-1 file:rounded file:cursor-pointer"/>
      </div>
    </div>
    <div class="mt-4 flex items-center gap-3">
      <button onclick="uploadLeads()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-5 py-2 rounded-lg transition">Generate Icebreakers &amp; Upload</button>
      <span id="uploadStatus" class="text-sm text-gray-400"></span>
    </div>
  </div>

  <!-- Campaigns Table -->
  <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-800 flex items-center justify-between">
      <h2 class="text-base font-semibold">Campaigns</h2>
      <button onclick="loadCampaigns()" class="text-xs text-gray-500 hover:text-gray-300 transition">↻ Refresh</button>
    </div>
    <div id="campaignsContainer" class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="text-xs text-gray-500 uppercase tracking-wider bg-gray-800/50">
          <tr>
            <th class="text-left px-6 py-3">Campaign</th>
            <th class="text-left px-6 py-3">Status</th>
            <th class="text-left px-6 py-3">Created</th>
            <th class="text-left px-6 py-3">Actions</th>
          </tr>
        </thead>
        <tbody id="campaignsBody">
          <tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- New Campaign Modal -->
<div id="newCampaignModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-gray-900 border border-gray-700 rounded-xl p-6 w-full max-w-md mx-4">
    <h3 class="font-semibold text-base mb-4">Create New Campaign</h3>
    <label class="block text-xs text-gray-400 mb-1">Campaign Name (e.g. "Smith Plumbing — March")</label>
    <input id="newCampaignName" type="text" placeholder="Client Name — Month" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm mb-4 focus:outline-none focus:border-indigo-500"/>
    <div class="flex gap-3">
      <button onclick="createCampaign()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2 rounded-lg transition">Create</button>
      <button onclick="closeNewCampaign()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-sm py-2 rounded-lg transition">Cancel</button>
    </div>
    <p id="createStatus" class="text-xs text-gray-400 mt-3 hidden"></p>
  </div>
</div>

<script>
const STATUS_MAP = {0:'Draft',1:'Active',2:'Paused',3:'Completed',4:'Error'};
const STATUS_COLOR = {0:'text-yellow-400',1:'text-green-400',2:'text-orange-400',3:'text-blue-400',4:'text-red-400'};

async function api(method, path, body) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

async function loadCampaigns() {
  const tbody = document.getElementById('campaignsBody');
  tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">Loading…</td></tr>';
  try {
    const data = await api('GET', '/api/campaigns');
    const items = data.items || [];
    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">No campaigns yet. Create one above.</td></tr>';
      return;
    }
    tbody.innerHTML = items.map(c => {
      const status = STATUS_MAP[c.status] || 'Unknown';
      const color = STATUS_COLOR[c.status] || 'text-gray-400';
      const date = c.timestamp_created ? new Date(c.timestamp_created).toLocaleDateString() : '—';
      const isActive = c.status === 1;
      const isDraft = c.status === 0;
      return `<tr class="border-t border-gray-800 hover:bg-gray-800/30 transition">
        <td class="px-6 py-4 font-medium">${esc(c.name)}</td>
        <td class="px-6 py-4"><span class="${color} font-medium">${status}</span></td>
        <td class="px-6 py-4 text-gray-400">${date}</td>
        <td class="px-6 py-4 flex items-center gap-2">
          ${isDraft ? `<button onclick="launchCampaign('${c.id}')" class="bg-green-600 hover:bg-green-500 text-white text-xs font-medium px-3 py-1.5 rounded-lg transition">▶ Launch</button>` : ''}
          ${isActive ? `<button onclick="pauseCampaign('${c.id}')" class="bg-orange-600 hover:bg-orange-500 text-white text-xs font-medium px-3 py-1.5 rounded-lg transition">⏸ Pause</button>` : ''}
          <button onclick="copyId('${c.id}')" class="text-gray-500 hover:text-gray-300 text-xs px-2 py-1.5 rounded transition" title="Copy ID">ID</button>
        </td>
      </tr>`;
    }).join('');
    // Populate the campaign selector for uploads
    const sel = document.getElementById('uploadCampaignId');
    sel.innerHTML = items.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-red-400">Error: ${e.message}</td></tr>`;
  }
}

async function launchCampaign(id) {
  if (!confirm('Launch this campaign? Emails will start sending.')) return;
  const r = await api('POST', `/api/campaigns/${id}/launch`);
  if (r._error) { alert('Error: ' + JSON.stringify(r.detail)); return; }
  await loadCampaigns();
}

async function pauseCampaign(id) {
  const r = await api('POST', `/api/campaigns/${id}/pause`);
  if (r._error) { alert('Error: ' + JSON.stringify(r.detail)); return; }
  await loadCampaigns();
}

function openNewCampaign() {
  document.getElementById('newCampaignModal').classList.remove('hidden');
  document.getElementById('newCampaignName').focus();
}
function closeNewCampaign() {
  document.getElementById('newCampaignModal').classList.add('hidden');
  document.getElementById('createStatus').classList.add('hidden');
}

async function createCampaign() {
  const name = document.getElementById('newCampaignName').value.trim();
  if (!name) return;
  const statusEl = document.getElementById('createStatus');
  statusEl.textContent = 'Creating…';
  statusEl.classList.remove('hidden');
  const r = await api('POST', '/api/campaigns', {name});
  if (r._error) {
    statusEl.textContent = 'Error: ' + JSON.stringify(r.detail);
    return;
  }
  closeNewCampaign();
  document.getElementById('newCampaignName').value = '';
  await loadCampaigns();
}

async function uploadLeads() {
  const campaignId = document.getElementById('uploadCampaignId').value;
  const file = document.getElementById('csvFile').files[0];
  const status = document.getElementById('uploadStatus');
  if (!campaignId) { status.textContent = '⚠ Select a campaign first'; return; }
  if (!file) { status.textContent = '⚠ Select a CSV file first'; return; }

  status.textContent = 'Reading CSV…';
  const csv = await file.text();

  status.textContent = 'Generating icebreakers & uploading to Instantly…';
  try {
    const r = await api('POST', '/api/upload-leads', {campaign_id: campaignId, csv});
    if (r._error || r.error) {
      status.textContent = '✗ ' + (r.error || JSON.stringify(r.detail));
      return;
    }
    status.textContent = `✓ ${r.leads_processed} leads uploaded with icebreakers!`;
    document.getElementById('csvFile').value = '';
  } catch(e) {
    status.textContent = '✗ ' + e.message;
  }
}

function copyId(id) {
  navigator.clipboard.writeText(id).catch(()=>{});
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Load on startup
loadCampaigns();
</script>
</body>
</html>
